<!doctype html>
<html lang="ar" dir="rtl" class="dark" data-default-dir="rtl">
  <head>
    <script>
      // Pre-paint language + direction to avoid RTL/LTR flash on load.
      (function () {
        try {
          var lang = localStorage.getItem("zero_lang");
          if (lang === "en") {
            document.documentElement.lang = "en";
            document.documentElement.dir = "ltr";
          } else {
            document.documentElement.lang = "ar";
            document.documentElement.dir = "rtl";
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
